# Cheasee-Pi — Docker Compose orchestration
# ===========================================
# Builds and runs the cheasee-pi container with workspace mounts,
# environment variables, and resource limits driven by .pi/settings.json.
#
# Usage (via wrapper):
#   ./cheasee-pi.sh
#
# Direct usage (without wrapper — uses defaults):
#   docker compose -f docker/docker-compose.yml up -d --build
#   docker exec -it cheasee-pi /bin/bash -c 'cd /workspaces/main && pi'

services:
  cheasee-pi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cheasee-pi
    env_file:
      - ../.agent_env
    environment:
      - HOST_UID=${HOST_UID}
      - HOST_GID=${HOST_GID}
    volumes:
      - ../../:/workspaces
    deploy:
      resources:
        limits:
          memory: ${CHEASEEPI_MEMORY:-4G}
          cpus: ${CHEASEEPI_CPUS:-2.0}
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
