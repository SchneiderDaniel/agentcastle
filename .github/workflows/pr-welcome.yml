name: PR Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  welcome:
    runs-on: ubuntu-latest
    # Only for external contributors (not codeowners)
    if: |
      github.event.pull_request.author_association != 'OWNER'
      && github.event.pull_request.author_association != 'COLLABORATOR'
      && github.event.pull_request.author_association != 'MEMBER'
    steps:
      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file - <<WELCOME
          ## 👋 Welcome, @${{ github.event.pull_request.user.login }}!

          Thanks for submitting this PR to AgentCastle. A maintainer will review it shortly.

          ### Quick checklist
          - [ ] Commits follow [conventional-commits](https://www.conventionalcommits.org/)
          - [ ] Tests pass and cover the changes
          - [ ] No sensitive data committed (secrets, credentials, tokens)
          - [ ] PR description clearly states what changed and why

          _We aim to review within 2-3 business days. Appreciate your contribution!_
          WELCOME
